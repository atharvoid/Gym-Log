name: CI

# Zero-tolerance quality gate. Runs on every PR to main and every push to main.
# A merge is blocked unless analyze (0 issues), custom lints, the full test
# suite, and BOTH release compilations succeed. See docs/CI_RUNBOOK.md.

on:
  push:
    branches: [main, 'remediation/**']
  pull_request:
    branches: [main, 'remediation/**']

# Cancel superseded runs on the same branch to save Actions minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pin this to the version you build with locally (`flutter --version`) so CI
  # analyzer output is reproducible. `stable` tracks the latest stable release.
  FLUTTER_CHANNEL: stable

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      # DAO integration tests open host SQLite through dart:ffi. ubuntu ships
      # libsqlite3.so.0; install the dev package so the unversioned soname the
      # test prefers is also present.
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Resolve dependencies
        run: flutter pub get

      # Style is part of "zero tolerance". If this fails, run `dart format .`
      # locally and commit before pushing (see the runbook).
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      # Treats infos, warnings, and lints from analysis_options.yaml as FATAL.
      - name: Static analysis (zero tolerance)
        run: flutter analyze --fatal-infos --fatal-warnings

      # riverpod_lint / custom_lint rules are NOT covered by `flutter analyze`;
      # they run through the custom_lint driver.
      - name: Custom lints (riverpod_lint)
        run: dart run custom_lint

      # Machine-readable JSON report; pipefail propagates a test failure exit
      # code through tee so the job fails on a single failing test.
      - name: Run tests
        run: |
          set -o pipefail
          flutter test --machine | tee test-results.json

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.json
          if-no-files-found: warn

  build-android:
    name: Build Android (release)
    runs-on: ubuntu-latest
    needs: analyze-test
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      # Compile-only gate. Secrets injected via --dart-define-from-file=.env are
      # NOT required to COMPILE — the app degrades to free/offline without them.
      # R8 shrink + resource shrink are configured in android/app/build.gradle.kts;
      # --obfuscate + --split-debug-info add Dart-level obfuscation.
      - name: Build release APK (R8 shrink + Dart obfuscation)
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-symbols
      - name: Upload obfuscation symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-symbols
          path: build/debug-symbols
          if-no-files-found: warn

  build-ios:
    name: Build iOS (release, no codesign)
    runs-on: macos-latest
    needs: analyze-test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      # Generic device target, no signing — proves Dart + native (Pod) deps
      # compile. Code signing for store submission remains a manual step.
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

  # Single aggregate check — convenient to mark as the one required status check
  # in branch protection (it only passes when all three gates above pass).
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [analyze-test, build-android, build-ios]
    if: always()
    steps:
      - name: Confirm all gates passed
        run: |
          echo "analyze-test=${{ needs.analyze-test.result }}"
          echo "build-android=${{ needs.build-android.result }}"
          echo "build-ios=${{ needs.build-ios.result }}"
          if [ "${{ needs.analyze-test.result }}" != "success" ] \
            || [ "${{ needs.build-android.result }}" != "success" ] \
            || [ "${{ needs.build-ios.result }}" != "success" ]; then
            echo "::error::One or more CI gates failed."
            exit 1
          fi
          echo "All CI gates passed."
