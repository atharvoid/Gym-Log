name: gymlog
description: GymLog - workout logging app scaffold
publish_to: 'none'
version: 0.1.0
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # DB
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0

  # State
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Auth
  supabase_flutter: ^2.5.0
  flutter_secure_storage: ^9.0.0

  # Exercise data / media
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.0
  gif_view: ^0.4.0

  # Charts
  fl_chart: ^0.68.0

  # Typography
  google_fonts: ^6.2.0

  # Payments
  url_launcher: ^6.2.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.2.0
  connectivity_plus: ^5.0.0
  vibration: ^1.9.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/db/
