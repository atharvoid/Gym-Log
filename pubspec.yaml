name: gymlog
description: GymLog - workout logging app scaffold
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # DB
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.42

  # State
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Auth
  supabase_flutter: ^2.5.0
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.0

  # Exercise data / media
  flutter_svg: ^2.0.10 # muscle-group glyphs on routine cards
  cached_network_image: ^3.3.0
  gif_view: ^0.4.0

  # Charts
  fl_chart: ^0.68.0

  # Typography
  google_fonts: ^6.2.0

  # Payments
  url_launcher: ^6.2.0
  purchases_flutter: ^8.11.0

  # Sharing (CSV export)
  share_plus: ^12.0.2

  # File import (Hevy / Strong CSV)
  file_picker: ^8.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  package_info_plus: ^8.0.0
  collection: ^1.18.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  flutter_web_plugins:
    sdk: flutter
  path: ^1.9.1
  flutter_cache_manager: ^3.4.1
  sentry_flutter: ^8.14.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  sqlite3: ^2.4.0 # host-VM sqlite for DAO integration tests
  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.0
  sentry_dart_plugin: ^3.4.0

flutter:
  uses-material-design: true
  assets:
    # SECURITY: .env is NOT a bundled asset. Config is injected at compile
    # time via --dart-define-from-file=.env (see lib/core/config/env.dart).
    # Bundling it would ship the raw file inside every APK/IPA and break
    # clean-checkout builds when the gitignored file is absent.
    - assets/db/exercises.json
    # Muscle-group glyphs for routine cards (simple originals; swap a polished
    # pack in at the same paths to upgrade).
    - assets/icons/muscles/
    # generated/copied to the app's documents directory at first launch, not
    # a bundled asset. Bundling it would waste ~870 KB in every APK build.

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  upload_sources: true
  project: gymlog
  org: your-org-slug
  auth_token: env.SENTRY_AUTH_TOKEN

