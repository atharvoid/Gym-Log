targets:
  $default:
    builders:
      drift_dev:
        options:
          # The app accesses the DB through hand-written DAOs, not Drift's
          # generated "manager" API. Disabling it keeps database.g.dart lean
          # and free of the manager's FK-filter lint warnings
          # (unnecessary_null_comparison / non_null_assertion).
          generate_manager: false
