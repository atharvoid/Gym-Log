<!DOCTYPE html>
<html lang="en">

  <title>Muscle Group SVGs - Gym Log App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a090f;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      color: #e9d5ff;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .header p {
      color: #7c3aed;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 4px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #14121f;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid #1e1b2e;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .card:hover {
      border-color: #7c3aed;
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.15);
      transform: translateY(-4px);
    }
    .card-title {
      color: #a78bfa;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    .svg-container {
      width: 100%;
      aspect-ratio: 400/520;
      border-radius: 16px;
      overflow: hidden;
      background: #0f0d1a;
    }
    .svg-container svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
