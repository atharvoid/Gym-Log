  <path d="M 146 236 Q 150 248 148 262" fill="none" stroke="#6d28d9" stroke-width="2" opacity="0.6"/>
  <path d="M 258 220 Q 252 232 254 246" fill="none" stroke="#6d28d9" stroke-width="2" opacity="0.6"/>
