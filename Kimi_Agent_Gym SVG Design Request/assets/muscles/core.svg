  <text x="200" y="442" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#8b5cf6" letter-spacing="4">ABS &amp; OBLIQUES</text>
  <line x1="170" y1="458" x2="230" y2="458" stroke="#7c3aed" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
