# GymLog — Dart/Flutter Analysis Options
#
# This configuration is the LOCAL mirror of what CI runs. The two must stay in
# sync — if local analyze is weaker than CI, the agent discovers failures late.
# See docs/CI_RUNBOOK.md and scripts/verify.ps1.

include: package:flutter_lints/flutter.yaml

analyzer:
  plugins:
    - custom_lint          # activates riverpod_lint locally, not just in CI
  exclude:
    - "ex/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  errors:
    # Promote the lints that map to real GymLog bugs to hard errors.
    use_build_context_synchronously: error

# Configure custom_lint rules (e.g. from riverpod_lint)
custom_lint:
  rules:
    - missing_provider_scope: false
    - avoid_manual_providers_as_generated_provider_dependency: false

# Lint rules inherited from flutter_lints. Only override what you need.
# Do NOT add require_trailing_commas or prefer_const_constructors here —
# the existing codebase wasn't written with them, and with --fatal-infos
# they'd block every build. Adopt incrementally via dart fix if desired.
